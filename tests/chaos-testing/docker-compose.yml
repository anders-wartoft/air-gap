  dedup:
    restart: unless-stopped
    networks:
      - airgap
    image: eclipse-temurin:17-jre
    depends_on:
      - kafka
    volumes:
      - ../../java-streams/target:/dist/:ro
      - ../../config:/config:ro
      - ./:/this:ro
    working_dir: /this
    env_file:
      - dedup.env
    entrypoint: ["java", "-jar", "/dist/air-gap-deduplication-fat-1.jar"]

  chaos:
    restart: unless-stopped
    networks:
      - airgap
    image: rockylinux:9.3
    depends_on:
      - kafka
    ports:
      - 1234:1234
    volumes:
      - ../../:/dist:ro
      - ./out:/out:rw
    entrypoint:
      - /bin/bash
      - -c
      - |
        dnf install -y golang &&
        cd /dist &&
        go run /dist/tests/chaos-testing/main.go

networks:
  airgap:
    ipam:
      config:

        - subnet: 10.11.12.0/24
