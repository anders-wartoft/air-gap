---

services:
  kafka:
    networks:
      - airgap
    environment:
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://127.0.0.1:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@127.0.0.1:29093
    ports:
      - 9092:9092

    image: confluentinc/confluent-local

  dedup:
    image: rockylinux:9.3
    networks:
      - airgap
    depends_on:
      - kafka
    volumes:
      - ../../target/dist:/dist:ro
      - ../../config:/config:ro
    environment:
      RAW_TOPICS: receive
      CLEAN_TOPIC: dedup
      GAP_TOPIC: gaps
      BOOTSTRAP_SERVERS: kafka:9092
    entrypoint:
      - /bin/bash
      - -c
      - |
        dnf install -y /dist/airgap-dedup-1.0.0-325.noarch.rpm &&
        java -jar /opt/airgap/dedup/air-gap-deduplication-fat.jar


networks:
  airgap:
