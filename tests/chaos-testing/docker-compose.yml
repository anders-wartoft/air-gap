  downstream:
    restart: unless-stopped
    networks:
      - airgap
    image: rockylinux:9.3
    depends_on:
      - kafka
    volumes:
      - ../../:/dist:ro
    entrypoint:
      - /bin/bash
      - -c
      - |
        /dist/target/linux-amd64/downstream /dist/tests/chaos-testing/downstream.properties

  dedup:
    restart: unless-stopped
    networks:
      - airgap
    image: rockylinux:9.3
    depends_on:
      - kafka
    volumes:
      - ../../target/dist:/dist:ro
      - ../../config:/config:ro
      - ./:/this:ro
    entrypoint:
      - /bin/bash
      - -c
      - |
        dnf install -y /dist/airgap-dedup-1.0.0-325.noarch.rpm &&
        export LOG4J_CONFIGURATION_FILE=/this/log4j2.xml &&
        export RAW_TOPICS=receive &&
        export CLEAN_TOPIC=dedup &&
        export GAP_TOPIC=gaps &&
        export BOOTSTRAP_SERVERS=kafka:9092 &&
        export WINDOW_SIZE=100000 &&
        export MAX_WINDOWS=100000 &&
        export RAW_TOPICS=receive &&
        export CLEAN_TOPIC=dedup &&
        export GAP_TOPIC=gaps &&
        export GAP_EMIT_INTERVAL_SEC=60 &&
        export PERSIST_INTERVAL_MS=10000 &&
        export BOOTSTRAP_SERVERS=kafka:9092 &&
        export FAIL_FAST=true &&
        export FAIL_FAST_STARTUP_TIMEOUT_MS=30000 &&
        export FAIL_FAST_CHECK_INTERVAL_MS=1000 &&
        export FAIL_FAST_CHECK_TIMEOUT_MS=2000 &&
        java -jar /opt/airgap/dedup/air-gap-deduplication-fat.jar

  chaos:
    restart: unless-stopped
    networks:
      - airgap
    image: rockylinux:9.3
    depends_on:
      - kafka
    volumes:
      - ../../:/dist:ro
      - ./out:/out:rw
    entrypoint:
      - /bin/bash
      - -c
      - |
        dnf install -y golang &&
        cd /dist &&
        go run /dist/tests/chaos-testing/main.go

networks:
  airgap:
    ipam:
      config:

        - subnet: 10.11.12.0/24
