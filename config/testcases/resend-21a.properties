# What server to query
bootstrapServers=kafka-upstream.sitia.nu:9092,kafka-upstream.sitia.nu:8092
# Gaps topic to read from
topic=transfer
# Group to use when reading from Kafka
groupID=resend
# Log level
logLevel=DEBUG
# After loading the config, where to send the logs? stdout is default
#logFileName=./tmp/downstream.log
nic=lo0
targetIP=kafka-downstream.sitia.nu
targetPort=1234
payloadSize=auto
resendFileName=resend-first.json
eps=200

# Cluster 1 range: serve only downstream partitions 0..4
# (partitionStartValue + partitionStopValue gives the handled window)
partitionStartValue=0
partitionStopValue=5

# If the same bundle also contains cluster 2 partitions (10..14),
# run a second resend instance with another properties file using:
# partitionStartValue=10
# partitionStopValue=5

# TLS to Kafka
# Certificate file
#certFile=certs/tmp/airgap-downstream.crt
# Key file
#keyFile=certs/tmp/airgap-downstream.key
# CA file
#caFile=certs/tmp/kafka-ca.crt