# What server to query (cluster 2)
bootstrapServers=kafka-upstream2.sitia.nu:9092,kafka-upstream2.sitia.nu:8092
# Topic to read from
topic=transfer
# Group to use when reading from Kafka
groupID=resend
# Log level
logLevel=DEBUG
# After loading the config, where to send the logs? stdout is default
#logFileName=./tmp/downstream.log
nic=lo0
targetIP=kafka-downstream.sitia.nu
targetPort=1234
payloadSize=auto
resendFileName=resend-first.json
eps=200

# Cluster 2 range: serve only downstream partitions 10..14
partitionStartValue=10
partitionStopValue=5

# TLS to Kafka
# Certificate file
#certFile=certs/tmp/airgap-downstream.crt
# Key file
#keyFile=certs/tmp/airgap-downstream.key
# CA file
#caFile=certs/tmp/kafka-ca.crt
