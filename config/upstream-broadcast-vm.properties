# Upstream Configuration for UDP Broadcast in Virtual Environments
# Optimized for VMware/KVM/VirtualBox deployments
#
# This configuration enables UDP broadcast mode with optimizations to minimize
# packet loss in constrained virtual networking environments.
#
# Key Features:
# - UDP broadcast (no static ARP/route needed)
# - Compression enabled for bandwidth reduction
# - Conservative send rate for VM networking
# - Statistics logging for monitoring
#
# Usage:
#   ./upstream config/upstream-broadcast-vm.properties

# Instance identification
id=Upstream_Broadcast_VM

# Logging configuration
logLevel=INFO
logFileName=/var/log/airgap/upstream-broadcast.log
logStatistics=10                    # Log statistics every 10 seconds

# Network interface (REQUIRED for broadcast)
# This ensures broadcast packets only go out the specified interface
nic=eth0

# UDP Broadcast target
# targetIP=255.255.255.255 enables global broadcast mode
# The application automatically sets SO_BROADCAST socket option
targetIP=255.255.255.255
targetPort=1234

# Transport protocol
transport=udp

# Kafka source configuration
source=kafka
bootstrapServers=kafka-upstream:9092
topic=transfer
groupID=upstream-broadcast-group
clientId=upstream-broadcast-client

# Send rate limiting (events per second)
# Start conservative in VM environments, increase gradually while monitoring loss
# Recommended: Start at 3000 EPS, monitor with vmware-drop-detector.sh
# If loss < 5%, increase by 1000 EPS increments
# If loss > 10%, decrease by 500 EPS
eps=3000

# Compression (HIGH IMPACT for bandwidth reduction)
# Compress messages larger than 1KB using gzip
# Typical savings: 50-80% for text-based payloads (JSON, XML, logs)
# CPU overhead is minimal on modern hardware
compressWhenLengthExceeds=1024

# MTU configuration
# Use 'auto' to detect from NIC, or set explicit value
# Common values: 1500 (Ethernet), 9000 (Jumbo frames)
mtu=auto

# Message payload size
# 'auto' adjusts to MTU, or set explicit max payload size
payloadSize=auto

# Encryption (optional)
# Leave empty or set to false to disable encryption
# Set to true and provide publicKeyFile for encrypted transmission
encryption=false
#publicKeyFile=certs/downstream-public.pem
#generateNewSymmetricKeyEvery=300

# TLS to Kafka (optional)
# Uncomment if Kafka requires TLS/mTLS
#certFile=certs/upstream-client.crt
#keyFile=certs/upstream-client.key
#keyPasswordFile=certs/upstream-client.key.pw
#caFile=certs/kafka-ca.crt

# Input filtering (optional)
# Filter messages before transmission based on regex patterns
#inputFilterRules=config/input-filter-rules.txt
#inputFilterDefaultAction=allow
#inputFilterTimeout=100

# Performance notes for VM environments:
# ==========================================
# 1. Start with eps=3000, increase gradually while monitoring
# 2. Enable compression (compressWhenLengthExceeds=1024)
# 3. Use VMXNET3 virtual NIC driver (not E1000)
# 4. Monitor with: ./tools/dev/vmware-drop-detector.sh
# 5. Expect 5-10% packet loss even with optimization
# 6. Deduplicator will detect and recover from gaps
# 7. Consider redundant upstream instances for HA
#
# See doc/FAQ.md "UDP broadcast is dropping packets in VMware"
# for complete optimization guide.
