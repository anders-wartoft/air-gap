# Used in some log events to identify the source
id=Downstream_1
# Used in the MTU code
nic=en0
# UDP target (what IP to listen to)
targetIP=0.0.0.0
# UDP port to listen to
targetPort=1234
# Kafka target. If more than one, separate the servers with a comma ,
target=cmd
#bootstrapServers=192.168.153.143:9092,192.168.153.144:9092
# Topic to write to
#topic=downstream
# Glob that will identify the path(s) to all private keys we should try to use
# when a key exchange packet is received
privateKeyFiles=../certs/private*.pem
# kafka or cmd (cmd untested)
#target=kafka
# Some extra printouts
logLevel=DEBUG
numReceivers=10
# Set mtu to auto or 0 will query the nic of the mtu
mtu=auto

# Configure TCP
transport=tcp
# Configure TLS for the TCP server (used for key exchange and log events)
tcpTLSEnabled=true
tcpTLSCAFile=./certs/ca.crt
tcpTLSCertFile=./certs/downstream.crt
tcpTLSKeyFile=./certs/downstream.key
tcpTLSKeyPasswordFile=./certs/downstream.key.pw
tcpTLSClientAuth=require
tcpTLSClientCNRegex=^nu.sitia.airgap.upstream-[0-9]+$

tcpTLSCipherSuites=TLS1.3
#TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
