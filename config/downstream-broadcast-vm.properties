# Downstream Configuration for UDP Broadcast in Virtual Environments
# Optimized for VMware/KVM/VirtualBox deployments
#
# This configuration enables receiving UDP broadcast packets with optimizations
# to handle high packet rates and minimize buffer overflows in VM environments.
#
# Key Features:
# - Receive UDP broadcast on all interfaces (0.0.0.0)
# - Increased buffer sizes for burst tolerance
# - Multiple receiver threads for better CPU utilization
# - SO_RXQ_OVFL monitoring enabled
# - Statistics logging for diagnostics
#
# Usage:
#   ./downstream config/downstream-broadcast-vm.properties
#
# IMPORTANT: With multiple receiver threads (numReceivers > 1), each broadcast
# packet may be duplicated to all receivers. Use firewall DNAT to convert
# broadcast to unicast. See README.md "Broadcast Duplication" section.

# Instance identification
id=Downstream_Broadcast_VM

# Logging configuration
logLevel=INFO
logFileName=/var/log/airgap/downstream-broadcast.log
logStatistics=10                    # Log statistics every 10 seconds

# Network configuration
# targetIP=0.0.0.0 listens on all interfaces for broadcast packets
# nic is used only for MTU auto-detection
targetIP=0.0.0.0
targetPort=1234
nic=eth0

# Transport protocol
transport=udp

# Kafka destination configuration
target=kafka
bootstrapServers=kafka-downstream:9092
clientId=downstream-broadcast-client

# Receiver threads (IMPORTANT for VMs)
# More threads = better CPU utilization and faster packet processing
# Increase from default 10 to 20 for high-throughput scenarios
# With broadcast, requires firewall DNAT to avoid duplication (see README.md)
numReceivers=20

# Buffer configurations (CRITICAL for VM environments)

# OS-level socket receive buffer (SO_RCVBUF)
# Increased from default 4MB to 16MB to absorb burst traffic
# This is the first line of defense against packet loss
rcvBufSize=16777216                 # 16 MB

# Application-level channel buffer
# Queue between UDP reader goroutines and Kafka writer goroutines
# Increased from default 16384 to 32768
channelBufferSize=32768

# Read buffer multiplier
# Size of user-space buffer = mtu * readBufferMultiplier
# Increased from default 16 to 32
readBufferMultiplier=32

# Kafka batch size
# Number of messages grouped in a single Kafka batch
# Default 32 is usually optimal, increase to 64 for higher throughput
batchSize=32

# Socket receive queue overflow monitoring (Linux only)
# Tracks drops in the socket buffer (between kernel and application)
# When enabled, statistics include SO_RXQ_OVFL and SO_RXQ_OVFL_TOTAL
enableRxqOvfl=true

# Fragment cache limits (protection against memory exhaustion)
# maxCacheEntries: Max in-flight fragmented messages
# maxNrMessages: Max fragments per message
# Defaults are usually sufficient; increase if "Fragment cache full" warnings appear
maxCacheEntries=100000
maxNrMessages=4096

# MTU configuration
mtu=auto

# Maximum decompression size
# Maximum size downstream will attempt to decompress
# Default 256MB is generous; decrease if memory-constrained
maximumDecompressSize=268435456     # 256 MiB

# Encryption (optional)
# Provide private key files to decrypt encrypted messages from upstream
#privateKeyFiles=certs/downstream*.key

# TLS to Kafka (optional)
# Uncomment if Kafka requires TLS/mTLS
#certFile=certs/downstream-client.crt
#keyFile=certs/downstream-client.key
#keyPasswordFile=certs/downstream-client.key.pw
#caFile=certs/kafka-ca.crt

# Internal topic (optional)
# Send internal status/error messages to a Kafka topic
# Useful for centralized monitoring
#internalTopic=airgap-internal

# Topic translations (optional)
# Rename topics received from upstream
# Format: oldTopic:newTopic,oldTopic2:newTopic2
# Useful in multi-downstream redundancy setups
#topicTranslations=transfer:transfer-downstream1

# TCP-specific limits (not used in UDP mode, shown for completeness)
maxTCPConnections=256

# Key exchange rate limiting (when encryption is enabled)
# Minimum seconds between accepting KEY_EXCHANGE messages
# Protects against RSA-OAEP decryption DoS
keyExchangeMinIntervalSecs=1

# System-level tuning required (run these commands on the host):
# ================================================================
# sudo sysctl -w net.core.rmem_max=33554432      # 32MB max
# sudo sysctl -w net.core.rmem_default=16777216  # 16MB default
# echo "net.core.rmem_max=33554432" | sudo tee -a /etc/sysctl.conf
# echo "net.core.rmem_default=16777216" | sudo tee -a /etc/sysctl.conf
# sudo sysctl -p

# Firewall DNAT for broadcast-to-unicast conversion (required for numReceivers > 1):
# ==================================================================================
# sudo firewall-cmd --permanent --add-port=1234/udp
# sudo firewall-cmd --permanent --direct --add-rule ipv4 nat PREROUTING 0 \
#   -d 255.255.255.255 -p udp --dport 1234 \
#   -j DNAT --to-destination $(hostname -I | awk '{print $1}'):1234
# sudo firewall-cmd --reload

# Monitoring commands:
# ====================
# # Check packet loss (compares upstream sent vs downstream received)
# ./tools/dev/vmware-drop-detector.sh /var/log/airgap/upstream-broadcast.log \
#                                      /var/log/airgap/downstream-broadcast.log
#
# # Watch socket drops in real-time
# tail -f /var/log/airgap/downstream-broadcast.log | grep SO_RXQ_OVFL
#
# # Check NIC-level drops (should be 0 if hypervisor is bottleneck)
# watch -n 5 'ip -s link show eth0 | grep -A 1 RX'
#
# # Monitor system UDP buffer usage
# netstat -s -u | grep -E "packet receive errors|receive buffer errors"

# Performance expectations for VM environments:
# ==============================================
# With these optimizations:
# - Compression: 50-80% bandwidth reduction (text payloads)
# - Larger buffers: Absorb 2-3x burst traffic
# - More receivers: 1.5-2x throughput vs default
# - VMXNET3 driver: 20-40% better vs E1000
#
# Realistic loss rate: 5-10% in constrained VMs (down from 10-20% unoptimized)
# Deduplicator handles gaps and triggers resend automatically.
#
# See doc/FAQ.md "UDP broadcast is dropping packets in VMware"
# for complete optimization guide and troubleshooting steps.
